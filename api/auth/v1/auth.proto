syntax = "proto3";

package tennisly.com.mvp.api.auth.v1;
option go_package = "tennisly.com/mvp/pb/api/auth/v1;authv1";

import "google/api/annotations.proto";
import "api/common/token/token.proto";

service Auth {
  rpc Register(RegisterRequest) returns (RegisterResponse) {
    option (google.api.http) = {
      post: "/v1/register"
      body: "*"
    };
  };

  rpc LogIn(LogInRequest) returns (LogInResponse) {
    option (google.api.http) = {
      post: "/v1/login"
      body: "*"
    };
  };

  rpc Refresh(RefreshRequest) returns (RefreshResponse) {
    option (google.api.http) = {
      post: "/v1/refresh"
      body: "*"
    };
  };

  rpc Dummy(DummyMsg) returns (DummyMsg) {
    option (google.api.http) = {
      post: "/v1/dummy"
      body: "*"
    };
  };
}

message RegisterRequest {
  string user_name = 1;
  string full_name = 2;
  string email = 3;
  string password = 4;
}

message RegisterResponse {
 common.token.TokenPair token_pair = 1;
}

message LogInRequest {
  string email = 1;
  string password = 2;
}

message LogInResponse {
  common.token.TokenPair token_pair = 1;
}

message RefreshRequest {
  string refresh_token = 1;
}

message RefreshResponse {
  common.token.TokenPair token_pair = 1;
}

message DummyMsg {

}