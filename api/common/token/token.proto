syntax = "proto3";

package tennisly.com.mvp.api.common.token;
option go_package = "tennisly.com/mvp/pb/api/common/token;common_token";

import "google/protobuf/timestamp.proto";


message TokenPair {
  string access_token = 1;
  string refresh_token = 2;
  google.protobuf.Timestamp expires_at = 3;
}